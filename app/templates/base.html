<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LOL比赛分析系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .team-blue { color: #0d6efd; font-weight: 600; }
        .team-red { color: #dc3545; font-weight: 600; }
        .vs { color: #6c757d; font-size: 0.875rem; }
        .hero-chip {
            display: inline-block;
            padding: 0.35rem 0.75rem;
            margin: 0.2rem;
            border-radius: 2rem;
            font-size: 0.875rem;
        }
        .hero-chip-blue { background: #cfe2ff; color: #084298; }
        .hero-chip-red { background: #f8d7da; color: #842029; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand mb-0 h1 text-decoration-none" href="{{ url_for('main.index') }}">LOL比赛分析系统</a>
            <span class="navbar-text text-secondary">SQLite · 本地运行</span>
        </div>
    </nav>

    <main class="container pb-5">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
